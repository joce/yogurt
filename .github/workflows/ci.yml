name: CI

on:
  push:
    branches-ignore:
      - "experimental/*"
  pull_request:
    branches-ignore:
      - "experimental/*"

jobs:
  spell-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Check spelling
        run: npm run spell

  ci-checks:
    needs: spell-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Run tox
        run: uvx --with tox-uv tox -e py${{ matrix.python-version }}
