[tox]
envlist = py{3.10,3.11,3.12,3.13,3.14}
isolated_build = true
skip_missing_interpreters = true
requires = tox-uv >= 1.35

[gh-actions]
python =
    3.10: py3.10
    3.11: py3.11
    3.12: py3.12
    3.13: py3.13
    3.14: py3.14

[testenv]
description = Run checks for Python {envname}
runner = uv-venv-lock-runner
dependency_groups =
    dev
setenv =
    py3.10: PYRIGHT_PYTHON_VERSION = 3.10
    py3.11: PYRIGHT_PYTHON_VERSION = 3.11
    py3.12: PYRIGHT_PYTHON_VERSION = 3.12
    py3.13: PYRIGHT_PYTHON_VERSION = 3.13
    py3.14: PYRIGHT_PYTHON_VERSION = 3.14
commands =
    ruff format --check --quiet --diff --target-version py310 .
    ruff check --target-version py310 .
    pyright --pythonversion {env:PYRIGHT_PYTHON_VERSION}
    pytest -n auto

[testenv:check]
description = Run checks once on the current Python version
commands =
    ruff format --check --quiet --diff --target-version py310 .
    ruff check --target-version py310 .
    pyright
    pytest -n auto

[testenv:test]
description = Run only tests
commands =
    pytest

[testenv:coverage]
description = Run pytest with coverage reporting
dependency_groups =
    dev
setenv =
    COVERAGE_MINIMUM = 95
commands =
    pytest \
        --ignore-glob=**/integration/** \
        --cov=src \
        --cov-report=xml:coverage.xml \
        --cov-report=term-missing \
        --cov-fail-under={env:COVERAGE_MINIMUM} \
        --junitxml=junit.xml -o junit_family=legacy \
        {posargs}
